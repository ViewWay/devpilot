name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (e.g. 2026.4.28 or 2026.4.28-beta.1)"
        required: true
      build:
        description: "构建全平台安装包"
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Parse & Validate ───────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      suffix: ${{ steps.parse.outputs.suffix }}
    steps:
      - name: Parse version
        id: parse
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          # YYYY.M.D (stable)
          if [[ "$VERSION" =~ ^([0-9]{4})\.([0-9]{1,2})\.([0-9]{1,2})$ ]]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
            echo "::notice::Stable: DevPilot_$VERSION"
          # YYYY.M.D-{alpha|beta|rc}.N (pre-release)
          elif [[ "$VERSION" =~ ^([0-9]{4})\.([0-9]{1,2})\.([0-9]{1,2})-([a-z]+)\.([0-9]+)$ ]]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "suffix=${BASH_REMATCH[4]}.${BASH_REMATCH[5]}" >> "$GITHUB_OUTPUT"
            echo "::notice::Pre-release: DevPilot_$VERSION"
          else
            echo "::error::Invalid version: $VERSION"
            echo "::error::Expected: YYYY.M.D or YYYY.M.D-{alpha|beta|rc}.N"
            exit 1
          fi

  # ── Create Release ─────────────────────────────────────
  create-release:
    name: Create Release
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      version: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          DATE_ONLY="${VERSION%%-*}"

          # Find previous release tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]{4}\.' | grep -v "^v${VERSION}" | head -1)
          if [[ -n "$PREV_TAG" ]]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- No changes")
          else
            LOG=$(git log -20 --pretty=format:"- %s (%h)" --no-merges 2>/dev/null)
          fi

          # Limit to 50 entries
          ENTRY_COUNT=$(echo "$LOG" | wc -l | tr -d ' ')
          if [[ "$ENTRY_COUNT" -gt 50 ]]; then
            LOG=$(echo "$LOG" | head -50)
            LOG="${LOG}"$'\n'"- ... and $((ENTRY_COUNT - 50)) more commits"
          fi

          # Build body
          IS_PRE="${{ needs.validate.outputs.is_prerelease }}"
          if [[ "$IS_PRE" == "true" ]]; then
            BODY="## DevPilot_${VERSION} (Pre-release)

          > Automated pre-release build.

          ### Changes
          ${LOG}
          "
          else
            BODY="## DevPilot_${VERSION}

          ### Changes
          ${LOG}
          "
          fi

          # Write to file (multiline safe)
          echo "$BODY" > /tmp/release-body.md

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = '${{ needs.validate.outputs.version }}';
            const tag = `v${version}`;
            const isPrerelease = ${{ needs.validate.outputs.is_prerelease }} === 'true';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check for existing release
            try {
              const { data: releases } = await github.rest.repos.listReleases({ owner, repo });
              const existing = releases.find(r => r.tag_name === tag);
              if (existing) {
                core.setOutput('release_id', existing.id);
                core.info(`Reusing existing release: #${existing.id}`);
                return;
              }
            } catch (e) {
              core.info(`No existing releases: ${e.message}`);
            }

            const body = fs.readFileSync('/tmp/release-body.md', 'utf8');

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `DevPilot_${version}`,
              body: body,
              draft: !isPrerelease,
              prerelease: isPrerelease,
              make_latest: isPrerelease ? 'false' : 'true',
            });
            core.setOutput('release_id', data.id);
            core.info(`Created release #${data.id}: DevPilot_${version}`);

  # ── Build (macOS Apple Silicon) ────────────────────────
  build-macos-aarch64:
    name: Build — macOS (Apple Silicon)
    needs: create-release
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-aarch64-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: v${{ needs.create-release.outputs.version }}
          tauriScript: npx tauri
          args: --target aarch64-apple-darwin

  # ── Build (macOS Intel) ────────────────────────────────
  build-macos-x86_64:
    name: Build — macOS (Intel)
    needs: create-release
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-x86_64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-x86_64-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: v${{ needs.create-release.outputs.version }}
          tauriScript: npx tauri
          args: --target x86_64-apple-darwin

  # ── Build (Windows) ────────────────────────────────────
  build-windows:
    name: Build — Windows
    needs: create-release
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # WiX (MSI bundler) requires each version segment <= 255.
      # Convert YYYY.M.D → YY.M.D (drop century from year).
      - name: Patch version for WiX compatibility
        shell: pwsh
        run: |
          $version = "${{ needs.create-release.outputs.version }}"
          if ($version -match '^(\d{2})(\d{2})\.(\d{1,2})\.(\d{1,2})') {
            $yy = [int]$Matches[2]
            $m = [int]$Matches[3]
            $d = [int]$Matches[4]
            $wixVer = "$yy.$m.$d"
            Write-Host "Patching tauri.conf.json: $version → $wixVer"
            $path = "src-tauri/tauri.conf.json"
            $content = Get-Content $path -Raw
            $content = $content -replace '"version":\s*"[^"]*"', "`"version`": `"$wixVer`""
            Set-Content $path $content
          }

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: v${{ needs.create-release.outputs.version }}
          tauriScript: npx tauri

  # ── Build (Linux) ──────────────────────────────────────
  build-linux:
    name: Build — Linux
    needs: create-release
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: v${{ needs.create-release.outputs.version }}
          tauriScript: npx tauri

  # ── Publish ────────────────────────────────────────────
  publish-release:
    name: Publish
    needs:
      [
        validate,
        build-macos-aarch64,
        build-macos-x86_64,
        build-windows,
        build-linux,
      ]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.validate.outputs.version }}';
            const isPrerelease = ${{ needs.validate.outputs.is_prerelease }} === 'true';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: releases } = await github.rest.repos.listReleases({ owner, repo });
            const release = releases.find(r => r.tag_name === `v${version}`);
            if (!release) {
              core.setFailed(`Release v${version} not found`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              draft: false,
              prerelease: isPrerelease,
              make_latest: isPrerelease ? 'false' : 'true',
            });
            core.info(`Published: DevPilot_${version} (prerelease=${isPrerelease})`);
